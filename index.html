<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Bootstrap Grid Layout</title>
</head>

<body>
    <header class="text-center">
        <h1>Bootstrap 5 Responsive Grid</h1>
        <p>Layout a griglia con diversi breakpoint (sm, md, lg).</p>
    </header>

    <div class="container text-center">
        <div class="row p-2">
            <div class="col-12 bg-light p-4 col-md-6 col-lg-4">
                <p>colonna 1</p>
            </div>
            <div class="col-12 bg-secondary text-light p-4 col-md-6 col-lg-8">
                <p>colonna 2</p>
            </div>
        </div>

        <div class="row p-2">
            <div class="col-6 bg-primary text-light p-4 col-md-4">
                <p>colonna 1</p>
            </div>
            <div class="col-6 bg-success text-light p-4 col-md-4">
                <p>colonna 2</p>
            </div>
            <div class="col-12 bg-danger text-light p-4 col-md-4">
                <p>colonna 3</p>
            </div>
        </div>

        <div class="row p-2">
            <div class="col-6 bg-info text-light p-4 col-md-3">
                <p>colonna 1</p>
            </div>
            <div class="col-6 bg-warning text-light p-4 col-md-3">
                <p>colonna 2</p>
            </div>
            <div class="col-6 bg-black text-light p-4 col-md-3">
                <p>colonna 3</p>
            </div>
            <div class="col-6 bg-white p-4 col-md-3 ">
                <p>colonna 4</p>
            </div>
        </div>
    </div>




















    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
